{% extends 'hospitalapp/base.html' %}

{% block title %}Doctor Analytics — Asha Hospital HMS{% endblock %}

{% block content %}
<style>
    /* =========================================
       POWER BI DASHBOARD CONTAINER
       ========================================= */
    .dashboard-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border-top: 5px solid #4f46e5;
        background: #ffffff;
        transition: all 0.3s ease;
    }
    .dashboard-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }
</style>

<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-12 d-flex justify-content-between align-items-center flex-wrap g-3">
            <div>
                <h2 class="fw-bold text-primary mb-1"><i class="fa-solid fa-chart-line me-2"></i>Doctor Analytics</h2>
                <p class="text-muted mb-0">View your clinical performance, patient consultation analytics, and treatment compliance.</p>
            </div>
            <div>
                <span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 rounded-pill fw-bold">
                    <i class="fa-solid fa-signal text-success me-1"></i> Live PowerBI Feed
                </span>
            </div>
        </div>
    </div>

    <!-- Power BI Dashboard Row -->
    <div class="row mt-4 mb-4">
        <div class="col-md-12">
            <div class="card dashboard-card shadow-sm border-0">
                <div class="card-header bg-white py-3 border-0">
                    <h5 class="mb-0 fw-bold text-dark"><i class="fas fa-chart-pie me-2 text-primary"></i>Clinical Analytics Dashboard</h5>
                </div>
                <div class="card-body p-3">
                    <div class="ratio ratio-16x9" style="min-height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0;">
                        <iframe title="DOCTOR" width="100%" height="100%" src="https://app.powerbi.com/view?r=eyJrIjoiNzg4OGYzMzItMTVlMS00YTVhLTk3NzMtYzRlMjg3MTMyNjhlIiwidCI6IjIwNGEzM2FmLThmZWYtNDMyMi1hOTRkLTlhZDYyNjYwMjQ4MCJ9" frameborder="0" allowFullScreen="true"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
